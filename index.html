<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Christchurch Ltd</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161920;
    --bg3: #1e2129;
    --bg4: #252830;
    --border: #2e3140;
    --border2: #3a3e52;
    --text: #e8eaf0;
    --text2: #9da3b8;
    --text3: #6b7090;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --green: #22c55e;
    --orange: #f97316;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --amber: #f59e0b;
    --cyan-dim: rgba(0,212,255,0.08);
    --cyan-border: rgba(0,212,255,0.25);
    --font: 'Barlow', sans-serif;
    --mono: 'DM Mono', monospace;
    --condensed: 'Barlow Condensed', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  
  /* Layout */
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Sidebar */
  .sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
  .logo-text { font-family: var(--condensed); font-size: 22px; font-weight: 700; letter-spacing: 1px; color: var(--accent); }
  .logo-sub { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); }
  .sidebar-nav { padding: 12px 8px; flex: 1; }
  .nav-section { font-size: 10px; color: var(--text3); letter-spacing: 2px; text-transform: uppercase; font-family: var(--mono); padding: 8px 8px 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--cyan-dim); color: var(--accent); border: 1px solid var(--cyan-border); }
  .nav-icon { width: 16px; height: 16px; opacity: 0.8; flex-shrink: 0; }
  .nav-badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-family: var(--mono); }
  
  /* Top bar */
  .topbar { height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
  .topbar-title { font-family: var(--condensed); font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .topbar-date { font-family: var(--mono); font-size: 12px; color: var(--text3); margin-left: 8px; }
  .topbar-spacer { flex: 1; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 6px; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #00b8e0; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  
  /* Content */
  .content { flex: 1; overflow-y: auto; padding: 20px; }
  
  /* Dashboard */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--mono); margin-bottom: 8px; }
  .stat-value { font-size: 32px; font-weight: 700; font-family: var(--condensed); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .stat-accent { color: var(--accent); }
  .stat-green { color: var(--green); }
  .stat-red { color: var(--red); }
  .stat-orange { color: var(--orange); }
  
  /* Calendar nav */
  .cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .cal-nav-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; }
  .cal-nav-btn:hover { background: var(--bg4); color: var(--text); }
  .cal-month { font-family: var(--condensed); font-size: 20px; font-weight: 700; }
  .view-toggle { display: flex; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .view-btn { padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text2); background: transparent; border: none; font-family: var(--font); transition: all 0.15s; }
  .view-btn.active { background: var(--accent); color: #000; }
  
  /* Month grid */
  .month-grid { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .month-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--bg3); }
  .month-dow { padding: 10px; text-align: center; font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--mono); border-bottom: 1px solid var(--border); }
  .month-body { display: grid; grid-template-columns: repeat(7, 1fr); }
  .month-day { min-height: 80px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; cursor: pointer; transition: background 0.15s; position: relative; }
  .month-day:hover { background: var(--bg3); }
  .month-day.today { background: var(--cyan-dim); }
  .month-day.other-month .day-num { color: var(--text3); opacity: 0.4; }
  .day-num { font-size: 13px; font-weight: 600; color: var(--text2); font-family: var(--mono); margin-bottom: 4px; }
  .month-day.today .day-num { color: var(--accent); }
  .day-job-pill { font-size: 10px; padding: 2px 6px; border-radius: 3px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; font-weight: 500; }
  .day-more { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  
  /* Day view */
  .day-view { display: grid; grid-template-columns: 60px 1fr; gap: 0; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .time-col { border-right: 1px solid var(--border); }
  .time-slot { height: 60px; border-bottom: 1px solid var(--border); padding: 4px 8px; font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .day-col { position: relative; }
  .day-slots { }
  .day-slot { height: 60px; border-bottom: 1px solid var(--border); }
  .day-slot:hover { background: rgba(0,212,255,0.03); }
  .job-block { position: absolute; left: 4px; right: 4px; border-radius: 6px; padding: 6px 8px; cursor: pointer; overflow: hidden; border: 1px solid; transition: opacity 0.15s; }
  .job-block:hover { opacity: 0.9; }
  .job-block-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .job-block-sub { font-size: 10px; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  
  /* Workers grid */
  .workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .worker-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .worker-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .worker-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .worker-name { font-size: 15px; font-weight: 600; }
  .worker-role { font-size: 12px; color: var(--text3); }
  .worker-detail { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .worker-detail svg { color: var(--text3); flex-shrink: 0; }
  .worker-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; }
  .tag-blue { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .tag-green { background: rgba(34,197,94,0.15); color: #86efac; }
  .tag-purple { background: rgba(168,85,247,0.15); color: #d8b4fe; }
  .tag-amber { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .tag-cyan { background: var(--cyan-dim); color: var(--accent); border: 1px solid var(--cyan-border); }
  .sync-toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: var(--bg4); border-radius: 10px; transition: 0.2s; }
  .toggle-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: var(--text3); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .toggle-slider { background: var(--accent2); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--accent); }
  .sync-label { font-size: 11px; color: var(--text2); font-family: var(--mono); }
  
  /* Jobs table */
  .jobs-table { width: 100%; border-collapse: collapse; background: var(--bg2); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .jobs-table th { padding: 10px 14px; text-align: left; font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--mono); background: var(--bg3); border-bottom: 1px solid var(--border); }
  .jobs-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .jobs-table tr:last-child td { border-bottom: none; }
  .jobs-table tr:hover td { background: var(--bg3); }
  .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-family: var(--mono); font-weight: 500; }
  .status-scheduled { background: rgba(59,130,246,0.15); color: #93c5fd; }
  .status-inprogress { background: rgba(249,115,22,0.15); color: #fdba74; }
  .status-completed { background: rgba(34,197,94,0.15); color: #86efac; }
  .status-onhold { background: rgba(107,112,144,0.15); color: var(--text2); }
  .status-cancelled { background: rgba(239,68,68,0.1); color: #fca5a5; text-decoration: line-through; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .priority-low { background: var(--text3); }
  .priority-normal { background: var(--blue); }
  .priority-urgent { background: var(--red); }
  
  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(3px); }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 12px; width: 540px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--condensed); font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text3); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { background: var(--bg4); color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; font-family: var(--mono); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); }
  .form-input option { background: var(--bg2); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
  
  /* Job detail */
  .job-detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
  .job-detail-title { font-family: var(--condensed); font-size: 22px; font-weight: 700; }
  .detail-section { background: var(--bg3); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; }
  .detail-row { display: flex; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-key { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; font-family: var(--mono); min-width: 90px; padding-top: 1px; }
  .detail-val { font-size: 13px; color: var(--text); }
  
  /* Filters bar */
  .filters-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-select { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--text2); font-family: var(--font); font-size: 12px; outline: none; cursor: pointer; }
  .search-input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--text); font-family: var(--font); font-size: 12px; outline: none; width: 200px; }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { border-color: var(--accent); }
  
  /* Section heading */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-family: var(--condensed); font-size: 18px; font-weight: 700; }
  
  /* Worker color swatch */
  .color-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  
  /* Responsive */
  @media (max-width: 900px) {
    .sidebar { width: 60px; min-width: 60px; }
    .sidebar-logo, .nav-section, .nav-item span, .logo-sub { display: none; }
    .nav-icon { margin: 0 auto; }
    .nav-item { justify-content: center; padding: 10px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
  }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  
  /* Notification toast */
  .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; z-index: 200; font-size: 13px; transform: translateY(80px); opacity: 0; transition: all 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast-icon { font-size: 16px; }
  
  /* Gcal badge */
  .gcal-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(66,133,244,0.15); color: #7cb3ff; font-family: var(--mono); border: 1px solid rgba(66,133,244,0.3); }
  
  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state-text { font-size: 14px; }

</style>
</head>

<script>
// ============================================================
// PERMISSIONS (all open — login removed temporarily)
// ============================================================
function canManageWorkers() { return true; }
function canManageJobs() { return true; }
function canAccessCalendarSetup() { return true; }

const SUPABASE_URL = 'https://qgssqxqjoedwnrnmevlw.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnc3NxeHFqb2Vkd25ybm1ldmx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODYzOTgsImV4cCI6MjA5MDE2MjM5OH0.G5Hk9xvNnkGzAtquXC_XL7SRF3EFOHEyO2NDIapjt0Q';

const sbHeaders = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation',
};

async function sbGet(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers: sbHeaders });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbInsert(table, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST', headers: sbHeaders, body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  const rows = await res.json();
  return rows[0];
}

async function sbUpdate(table, id, data) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH', headers: sbHeaders, body: JSON.stringify(data)
  });
  if (!res.ok) throw new Error(await res.text());
  const rows = await res.json();
  return rows[0];
}

async function sbDelete(table, id) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'DELETE', headers: { ...sbHeaders, 'Prefer': 'return=minimal' }
  });
  if (!res.ok) throw new Error(await res.text());
}

today.setHours(0,0,0,0);

// ============================================================
// UTILS
// ============================================================
function getWorker(id) { return workers.find(w => w.id === id); }
function todayStr() { return today.toISOString().split('T')[0]; }
function formatDate(ds) {
  const [y,m,d] = ds.split('-');
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}
function monthName(d) { return d.toLocaleString('default',{month:'long'}); }
function initials(name) { return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }

function toast(msg, icon='✓') {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  document.getElementById('toast-icon').textContent = icon;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function workerColor(id) {
  const w = getWorker(id);
  return w ? w.color : '#888';
}

function colorWithAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function statusClass(s) {
  return { 'Scheduled':'scheduled', 'In Progress':'inprogress', 'Completed':'completed', 'On Hold':'onhold', 'Cancelled':'cancelled' }[s] || 'scheduled';
}
function priorityClass(p) {
  return { 'Low':'low', 'Normal':'normal', 'Urgent':'urgent' }[p] || 'normal';
}

function jobTypeColor(type) {
  return { 'Service':'#3b82f6', 'Install':'#a855f7', 'Maintenance':'#22c55e', 'Breakdown':'#ef4444' }[type] || '#888';
}

function getJobsForDate(dateStr) {
  return jobs.filter(j => j.date === dateStr);
}

function urgentCount() { return jobs.filter(j => j.priority === 'Urgent' && j.status !== 'Completed' && j.status !== 'Cancelled').length; }

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const items = document.querySelectorAll('.nav-item');
  const map = { dashboard: 0, schedule: 1, jobs: 2, workers: 3 };
  if (items[map[page]]) items[map[page]].classList.add('active');

  const titles = { dashboard: 'Dashboard', schedule: 'Schedule', jobs: 'Jobs', workers: 'Workers' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('page-date').textContent = '';
  document.getElementById('btn-add-job').style.display = (page === 'jobs') ? '' : 'none';
  document.getElementById('btn-add-worker').style.display = (page === 'workers') ? '' : 'none';
  document.getElementById('btn-gcal').style.display = (page === 'workers') ? '' : 'none';
  document.getElementById('urgent-badge').textContent = urgentCount();

  const renders = { dashboard: renderDashboard, schedule: renderSchedule, jobs: renderJobs, workers: renderWorkers };
  if (renders[page]) renders[page]();
}

function renderSchedule() {
  const d = viewDate;
  document.getElementById('page-date').textContent = `${monthName(d)} ${d.getFullYear()}`;

  document.getElementById('content').innerHTML = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      <div class="cal-month">${monthName(d)} ${d.getFullYear()}</div>
      <div class="topbar-spacer"></div>
      <div class="view-toggle">
        <button class="view-btn ${currentView==='month'?'active':''}" onclick="setView('month')">Month</button>
        <button class="view-btn ${currentView==='day'?'active':''}" onclick="setView('day')">Day</button>
      </div>
      ${currentView==='day' ? `<button class="btn btn-primary btn-sm" onclick="openJobModal()">+ New Job</button>` : ''}
    </div>
    <div id="cal-body"></div>
  `;
  if (currentView === 'month') renderMonthView();
  else renderDayView();
}

function changeMonth(dir) {
  viewDate.setMonth(viewDate.getMonth() + dir);
  renderSchedule();
}

function setView(v) { currentView = v; renderSchedule(); }

function renderMonthView() {
  const d = viewDate;
  const year = d.getFullYear(), month = d.getMonth();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month+1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  let cells = [];
  for (let i = 0; i < startDow; i++) {
    const dd = new Date(firstDay); dd.setDate(dd.getDate() - (startDow - i));
    cells.push({ date: dd, other: true });
  }
  for (let i = 1; i <= lastDay.getDate(); i++) {
    cells.push({ date: new Date(year, month, i), other: false });
  }
  while (cells.length % 7 !== 0) {
    const dd = new Date(lastDay); dd.setDate(dd.getDate() + (cells.length - lastDay.getDate() - startDow + 1));
    cells.push({ date: dd, other: true });
  }

  const body = document.getElementById('cal-body');
  body.innerHTML = `
    <div class="month-grid">
      <div class="month-header">
        ${dows.map(dow => `<div class="month-dow">${dow}</div>`).join('')}
      </div>
      <div class="month-body">
        ${cells.map(cell => {
          const ds = cell.date.toISOString().split('T')[0];
          const dayJobs = getJobsForDate(ds);
          const isToday = ds === todayStr();
          const urgent = dayJobs.some(j => j.priority === 'Urgent');
          return `<div class="month-day ${cell.other?'other-month':''} ${isToday?'today':''}" onclick="jumpToDay('${ds}')">
            <div class="day-num">${cell.date.getDate()}</div>
            ${dayJobs.slice(0,3).map(j => {
              const c = workerColor(j.workerId);
              return `<div class="day-job-pill" style="background:${colorWithAlpha(c,0.2)};color:${c};border:1px solid ${colorWithAlpha(c,0.4)};" onclick="event.stopPropagation();viewJob(${j.id})">${j.start} ${j.client.split(' ')[0]}</div>`;
            }).join('')}
            ${dayJobs.length > 3 ? `<div class="day-more">+${dayJobs.length-3} more</div>` : ''}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function jumpToDay(ds) {
  viewDate = new Date(ds);
  currentView = 'day';
  renderSchedule();
}

function renderDayView() {
  const ds = viewDate.toISOString().split('T')[0];
  document.getElementById('page-date').textContent = formatDate(ds);
  const dayJobs = getJobsForDate(ds);
  const hours = [];
  for (let h = 6; h <= 18; h++) hours.push(h);

  const prevDay = new Date(viewDate); prevDay.setDate(prevDay.getDate()-1);
  const nextDay = new Date(viewDate); nextDay.setDate(nextDay.getDate()+1);

  const body = document.getElementById('cal-body');
  body.innerHTML = `
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">
      <button class="cal-nav-btn" onclick="viewDate=new Date('${prevDay.toISOString().split('T')[0]}');renderSchedule()">‹ ${prevDay.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric'})}</button>
      <button class="cal-nav-btn" onclick="viewDate=new Date('${nextDay.toISOString().split('T')[0]}');renderSchedule()">${nextDay.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric'})} ›</button>
      <div class="topbar-spacer"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${workers.map(w => `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);"><span style="width:10px;height:10px;border-radius:50%;background:${w.color};display:inline-block;"></span>${w.name.split(' ')[0]}</div>`).join('')}
      </div>
    </div>
    <div style="position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;">
      <div style="display:grid;grid-template-columns:60px 1fr;">
        <div class="time-col">
          ${hours.map(h => `<div class="time-slot">${h < 12 ? h+'am' : h===12?'12pm':(h-12)+'pm'}</div>`).join('')}
        </div>
        <div style="position:relative;">
          ${hours.map(() => `<div class="day-slot"></div>`).join('')}
          ${dayJobs.map(j => {
            const w = getWorker(j.workerId);
            const [sh,sm] = j.start.split(':').map(Number);
            const [eh,em] = j.end.split(':').map(Number);
            const top = ((sh - 6) + sm/60) * 60;
            const height = Math.max(((eh-sh) + (em-sm)/60) * 60, 28);
            const c = w ? w.color : '#888';
            return `<div class="job-block" style="top:${top}px;height:${height}px;background:${colorWithAlpha(c,0.15)};border-color:${colorWithAlpha(c,0.5)};color:${c};" onclick="viewJob(${j.id})">
              <div class="job-block-title">${j.client}</div>
              ${height > 40 ? `<div class="job-block-sub">${j.type} · ${j.start}–${j.end}</div>` : ''}
              ${height > 55 && w ? `<div class="job-block-sub">${w.name.split(' ')[0]}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
    ${dayJobs.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">🗓</div><div class="empty-state-text">No jobs scheduled for this day</div></div>` : ''}
  `;
}

let jobFilter = { status: '', priority: '', type: '', search: '' };

function renderJobs() {
  let filtered = jobs.filter(j => {
    if (jobFilter.status && j.status !== jobFilter.status) return false;
    if (jobFilter.priority && j.priority !== jobFilter.priority) return false;
    if (jobFilter.type && j.type !== jobFilter.type) return false;
    if (jobFilter.search) {
      const s = jobFilter.search.toLowerCase();
      if (!j.client.toLowerCase().includes(s) && !j.location.toLowerCase().includes(s)) return false;
    }
    return true;
  }).sort((a,b) => {
    if (a.priority === 'Urgent' && b.priority !== 'Urgent') return -1;
    if (b.priority === 'Urgent' && a.priority !== 'Urgent') return 1;
    return new Date(b.date) - new Date(a.date);
  });

  document.getElementById('content').innerHTML = `
    <div class="filters-bar">
      <input class="search-input" placeholder="Search client or location…" oninput="jobFilter.search=this.value;renderJobs()" value="${jobFilter.search}">
      <select class="filter-select" onchange="jobFilter.status=this.value;renderJobs()">

        <option ${jobFilter.status==='Cancelled'?'selected':''}>Cancelled</option>

        <option ${jobFilter.priority==='Urgent'?'selected':''}>Urgent</option>
        <option ${jobFilter.priority==='Normal'?'selected':''}>Normal</option>
        <option ${jobFilter.priority==='Low'?'selected':''}>Low</option>
      </select>
      <select class="filter-select" onchange="jobFilter.type=this.value;renderJobs()">
        <option value="">All Types</option>
        <option ${jobFilter.type==='Service'?'selected':''}>Service</option>
        <option ${jobFilter.type==='Install'?'selected':''}>Install</option>
        <option ${jobFilter.type==='Maintenance'?'selected':''}>Maintenance</option>
        <option ${jobFilter.type==='Breakdown'?'selected':''}>Breakdown</option>
      </select>
      <span style="font-size:12px;color:var(--text3);font-family:var(--mono);">${filtered.length} jobs</span>
    </div>
    ${filtered.length === 0 ? `<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">No jobs match your filters</div></div>` : `

      <thead><tr>
        <th>Client</th><th>Date</th><th>Type</th><th>Time</th><th>Worker</th><th>Status</th><th>P</th><th>GCal</th><th></th>
      </tr></thead>
      <tbody>
        ${filtered.map(j => {
          const w = getWorker(j.workerId);

async function toggleWorkerSync(id, val) {
  const w = workers.find(x => x.id === id);
  if (!w) return;
  if (val && !w.gcalAccessToken) {
    toast(`Connect ${w.name}'s Google account first — use the Connect button on their card`, '⚠');
    setTimeout(() => renderWorkers(), 100);
    return;
  }
  try {
    await sbUpdate('workers', id, { gcal_sync: val });
    w.gcalSync = val;
    toast(val ? `Google Calendar sync enabled for ${w.name}` : `Sync disabled for ${w.name}`, '📅');
    renderWorkers();
  } catch(e) {
    toast(`Error updating sync: ${e.message}`, '⚠');
  }
}

async function saveJob() {
  const client = document.getElementById('f-client').value.trim();
  const location = document.getElementById('f-location').value.trim();
  if (!client || !location) { toast('Client name and location required', '⚠'); return; }

  const workerId = parseInt(document.getElementById('f-worker').value);
  const w = getWorker(workerId);
  const data = {
    client, company: document.getElementById('f-company').value.trim(),
    phone: document.getElementById('f-phone').value.trim(),
    location, description: document.getElementById('f-desc').value.trim(),
    type: document.getElementById('f-type').value,
    priority: document.getElementById('f-priority').value,
    date: document.getElementById('f-date').value,
    workerId,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    equipment: document.getElementById('f-equipment').value.trim(),
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
    reminderMinutes: parseInt(document.getElementById('f-reminder').value),
    createdBy: editingJobId ? (jobs.find(j=>j.id===editingJobId)?.createdBy || currentUser?.id) : currentUser?.id,
    createdByName: editingJobId ? (jobs.find(j=>j.id===editingJobId)?.createdByName || currentUser?.name) : currentUser?.name,
  };

  // Disable save button to prevent double submit
  const btn = document.querySelector('.modal-footer .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    if (editingJobId) {
      const existing = jobs.find(j => j.id === editingJobId);
      const updated = await sbUpdate('jobs', editingJobId, jobToDb(data));
      const mapped = mapJob({ ...jobToDb(data), id: editingJobId, gcal_event_id: existing?.gcalEventId });
      const idx = jobs.findIndex(j => j.id === editingJobId);
      jobs[idx] = mapped;
      closeModal();
      document.getElementById('urgent-badge').textContent = urgentCount();
      refreshCurrentPage();
      if (w?.gcalSync && w?.gcalAccessToken) {
        if (existing?.gcalEventId) gcalUpdateEvent(w, existing.gcalEventId, jobs[idx]);
        else gcalCreateEvent(w, jobs[idx]);
      } else { toast('Job updated successfully', '✓'); }
    } else {
      const row = await sbInsert('jobs', jobToDb(data));
      const newJob = mapJob(row);
      jobs.unshift(newJob);
      closeModal();
      document.getElementById('urgent-badge').textContent = urgentCount();
      refreshCurrentPage();
      if (w?.gcalSync && w?.gcalAccessToken) gcalCreateEvent(w, newJob);
      else toast('Job created successfully', '✓');
    }
  } catch(e) {
    toast(`Error saving job: ${e.message}`, '⚠');
    if (btn) { btn.disabled = false; btn.textContent = editingJobId ? 'Update Job' : 'Create Job'; }
  }
}

async function deleteJob(id) {
  if (!confirm('Delete this job? This will also remove the Google Calendar event.')) return;
  const j = jobs.find(x => x.id === id);
  const w = j ? getWorker(j.workerId) : null;
  try {
    await sbDelete('jobs', id);
    jobs = jobs.filter(x => x.id !== id);
    document.getElementById('urgent-badge').textContent = urgentCount();
    refreshCurrentPage();
    if (w?.gcalSync && w?.gcalAccessToken && j?.gcalEventId) gcalDeleteEvent(w, j.gcalEventId);
    else toast('Job deleted', '🗑');
  } catch(e) {
    toast(`Error deleting job: ${e.message}`, '⚠');
  }
}

      workers[idx] = { ...existing, ...data };
      toast('Worker updated successfully', '✓');
    } else {
      const row = await sbInsert('workers', workerToDb(data));
      workers.push(mapWorker(row));
      toast(`${name} added to the team`, '✓');
    }
    closeModal();
    renderWorkers();
  } catch(e) {
    toast(`Error saving worker: ${e.message}`, '⚠');
    if (btn) { btn.disabled = false; btn.textContent = editingWorkerId ? 'Update Worker' : 'Add Worker'; }
  }
}

// ============================================================
// OAUTH 2.0 FLOW (implicit / token grant via popup)
// ============================================================
let oauthPopupTimer = null;
let pendingOAuthWorkerId = null;

function startOAuthFlow(workerId) {
  if (!GCAL_CLIENT_ID) {
    toast('Set your Google OAuth Client ID first — click "Sync Calendar" in the toolbar', '⚠');
    return;
  }
  const w = workers.find(x => x.id === workerId);
  if (!w) return;
  if (!w.gcalEmail) { toast('Set the worker\'s Google email in their profile first', '⚠'); return; }

  pendingOAuthWorkerId = workerId;

  const params = new URLSearchParams({
    client_id: GCAL_CLIENT_ID,
    redirect_uri: GCAL_REDIRECT,
    response_type: 'token',
    scope: GCAL_SCOPES,
    login_hint: w.gcalEmail,
    prompt: 'consent',
    state: `worker_${workerId}`,
  });

  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  const popup = window.open(authUrl, 'gcal_oauth', 'width=520,height=640,left=200,top=100');

  if (!popup) {
    toast('Popup blocked — allow popups for this page and try again', '⚠');
    return;
  }

  toast(`Waiting for ${w.name} to authorise Google Calendar…`, '🔐');

  // Poll popup URL for the access_token fragment
  clearInterval(oauthPopupTimer);
  oauthPopupTimer = setInterval(() => {
    try {
      if (popup.closed) {
        clearInterval(oauthPopupTimer);
        toast('OAuth window closed — try again', '⚠');
        return;
      }
      const hash = popup.location.hash;
      if (hash && hash.includes('access_token')) {
        clearInterval(oauthPopupTimer);
        popup.close();
        const tokenParams = new URLSearchParams(hash.slice(1));
        const accessToken = tokenParams.get('access_token');
        const expiresIn = parseInt(tokenParams.get('expires_in') || '3600');
        handleOAuthToken(workerId, accessToken, expiresIn);
      }
    } catch(e) {
      // Cross-origin — popup still on Google, keep polling
    }
  }, 500);
}

async function handleOAuthToken(workerId, accessToken, expiresIn) {
  const w = workers.find(x => x.id === workerId);
  if (!w) return;
  const expiry = Date.now() + expiresIn * 1000;
  w.gcalAccessToken = accessToken;
  w.gcalTokenExpiry = expiry;
  w.gcalSync = true;
  // Persist token to Supabase so it survives page reloads & deployments
  try {
    await sbUpdate('workers', workerId, {
      gcal_access_token: accessToken,
      gcal_token_expiry: expiry,
      gcal_sync: true,
    });
  } catch(e) {
    console.warn('Could not persist token to Supabase:', e.message);
  }
  toast(`✓ ${w.name} connected to Google Calendar`, '📅');
  if (currentPage === 'workers') renderWorkers();
  const container = document.getElementById('modal-container');
  if (container.innerHTML) showGcalConfig();
}

async function revokeWorkerToken(workerId) {
  const w = workers.find(x => x.id === workerId);
  if (!w) return;
  if (w.gcalAccessToken) {
    fetch(`https://oauth2.googleapis.com/revoke?token=${w.gcalAccessToken}`, { method: 'POST' }).catch(() => {});
  }
  w.gcalAccessToken = null;
  w.gcalTokenExpiry = null;
  w.gcalSync = false;
  // Clear token from Supabase
  try {
    await sbUpdate('workers', workerId, {
      gcal_access_token: null,
      gcal_token_expiry: null,
      gcal_sync: false,
    });
  } catch(e) {
    console.warn('Could not clear token from Supabase:', e.message);
  }
  toast(`${w.name} disconnected from Google Calendar`, '🔌');
  if (currentPage === 'workers') renderWorkers();
  showGcalConfig();
}

function checkTokenValid(w) {
  if (!w.gcalAccessToken) return false;
  if (w.gcalTokenExpiry && Date.now() > w.gcalTokenExpiry - 60000) {
    toast(`${w.name}'s Google token has expired — please reconnect in Calendar Setup`, '⚠');
    w.gcalAccessToken = null;
    w.gcalTokenExpiry = null;
    w.gcalSync = false;
    // Clear expired token from Supabase
    sbUpdate('workers', w.id, {
      gcal_access_token: null,
      gcal_token_expiry: null,
      gcal_sync: false,
    }).catch(() => {});
    if (currentPage === 'workers') renderWorkers();
    return false;
  }
  return true;
}

// ============================================================
// GOOGLE CALENDAR API CALLS
// ============================================================
function buildCalendarEvent(job) {
  const w = getWorker(job.workerId);
  const description = [
    `Client: ${job.client}`,
    job.company ? `Company: ${job.company}` : '',
    job.phone ? `Phone: ${job.phone}` : '',
    `Location: ${job.location}`,
    `Job Type: ${job.type}`,
    job.equipment ? `Equipment: ${job.equipment}` : '',
    `Priority: ${job.priority}`,
    `Status: ${job.status}`,
    job.description ? `\nDescription:\n${job.description}` : '',
    job.notes ? `\nNotes:\n${job.notes}` : '',
    w ? `\nAssigned to: ${w.name} (${w.role})` : '',
    '\n— Synced by excelscheduling.io —',
  ].filter(Boolean).join('\n');

  // Build RFC3339 datetimes in local NZ time
  const startDT = `${job.date}T${job.start}:00`;
  const endDT   = `${job.date}T${job.end}:00`;

  // Build reminders — popup (in-app) + push notification to phone
  const reminderMinutes = job.reminderMinutes !== undefined ? job.reminderMinutes : 60;
  const reminders = reminderMinutes === -1 ? { useDefault: false, overrides: [] } : {
    useDefault: false,
    overrides: [
      { method: 'popup', minutes: reminderMinutes },
      { method: 'email', minutes: reminderMinutes },
    ],
  };

  return {
    summary: `${job.client} — ${job.type}`,
    location: job.location,
    description,
    start: { dateTime: startDT, timeZone: 'Pacific/Auckland' },
    end:   { dateTime: endDT,   timeZone: 'Pacific/Auckland' },
    colorId: job.priority === 'Urgent' ? '11' : job.type === 'Breakdown' ? '4' : job.type === 'Install' ? '7' : '1',
    reminders,
  };
}

async function gcalCreateEvent(w, job) {
  if (!checkTokenValid(w)) return;
  const calId = encodeURIComponent(w.gcalId || 'primary');
  const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events`;
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${w.gcalAccessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(buildCalendarEvent(job)),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || res.statusText);
    }
    const data = await res.json();
    // Store the real Google event ID back on the job in Supabase
    const idx = jobs.findIndex(j => j.id === job.id);
    if (idx !== -1) {
      jobs[idx].gcalEventId = data.id;
      await sbUpdate('jobs', job.id, { gcal_event_id: data.id }).catch(() => {});
    }
    toast(`📅 Event created in ${w.name}'s Google Calendar`, '✓');
    refreshCurrentPage();
  } catch(e) {
    toast(`GCal error: ${e.message}`, '⚠');
  }
}

async function gcalUpdateEvent(w, eventId, job) {
  if (!checkTokenValid(w)) return;
  const calId = encodeURIComponent(w.gcalId || 'primary');
  const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events/${eventId}`;
  try {
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${w.gcalAccessToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(buildCalendarEvent(job)),
    });
    if (!res.ok) {
      const err = await res.json();
      // If event not found (e.g. deleted manually in Google), create a new one
      if (res.status === 404) { await gcalCreateEvent(w, job); return; }
      throw new Error(err.error?.message || res.statusText);
    }
    toast(`📅 Google Calendar event updated for ${w.name}`, '✓');
  } catch(e) {
    toast(`GCal error: ${e.message}`, '⚠');
  }
}

async function gcalDeleteEvent(w, eventId) {
  if (!checkTokenValid(w)) { toast('Job deleted (calendar token expired)', '🗑'); return; }
  const calId = encodeURIComponent(w.gcalId || 'primary');
  const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events/${eventId}`;
  try {
    const res = await fetch(url, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${w.gcalAccessToken}` },
    });
    if (res.status === 410 || res.status === 404) {
      toast('Job deleted (event was already removed from Google Calendar)', '🗑');
      return;
    }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || res.statusText);
    }
    toast(`🗑 Job deleted & removed from ${w.name}'s Google Calendar`, '✓');
  } catch(e) {
    toast(`Job deleted (GCal error: ${e.message})`, '🗑');
  }
}

            <input class="form-input" id="uf-password" type="password" placeholder="${isEdit ? 'Leave blank to keep current' : 'Set a password'}">
          </div>
          <div style="background:var(--bg3);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--text3);">
            ${isEdit ? 'Editing an existing user. Email cannot be changed.' : 'The new user will be able to sign in immediately with these credentials.'}
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveUser(${id || 'null'})">${isEdit ? 'Update User' : 'Add User'}</button>
        </div>
      </div>
    </div>
  `;
}

async function saveUser(id) {
  const name = document.getElementById('uf-name').value.trim();
  const email = document.getElementById('uf-email').value.trim().toLowerCase();
  const role = document.getElementById('uf-role').value;
  const password = document.getElementById('uf-password').value;

  if (!name) { toast('Name is required', '⚠'); return; }
  if (!id && !email) { toast('Email is required', '⚠'); return; }
  if (!id && !password) { toast('Password is required', '⚠'); return; }

  const btn = document.querySelector('.modal-footer .btn-primary');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  try {
    if (id) {
      const updates = { name, role };
      if (password) updates.password_hash = await sha256(password);
      await sbUpdate('users', id, updates);
      toast(`${name} updated`, '✓');
    } else {
      const hash = await sha256(password);
      await sbInsert('users', { name, email, role, password_hash: hash });
      toast(`${name} added as ${role}`, '✓');
    }
    closeModal();
    renderUsers();
  } catch(e) {
    toast(`Error: ${e.message}`, '⚠');
    if (btn) { btn.disabled = false; btn.textContent = id ? 'Update User' : 'Add User'; }
  }
}

async function deleteUser(id, name) {
  if (!confirm(`Remove ${name}? They will no longer be able to sign in.`)) return;
  try {
    await sbDelete('users', id);
    toast(`${name} removed`, '🗑');
    renderUsers();
  } catch(e) {
    toast(`Error: ${e.message}`, '⚠');
  }
}


function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-container').innerHTML = '';
}

// ============================================================
// INIT — check session then load data
// ============================================================
async function initApp() {
  // Show loading state
  document.getElementById('content').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;">
      <div style="width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text3);">Connecting to database…</div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  `;

  try {
    const [workerRows, jobRows, settingRows] = await Promise.all([
      sbGet('workers', 'order=name.asc'),
      sbGet('jobs', 'order=date.desc,start_time.asc'),
      sbGet('settings', 'key=eq.gcal_client_id'),
    ]);
    workers = workerRows.map(mapWorker);
    jobs = jobRows.map(mapJob);
    if (settingRows.length > 0 && settingRows[0].value) {
      GCAL_CLIENT_ID = settingRows[0].value;
    }
  } catch(e) {
    document.getElementById('content').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;">
        <div style="font-size:32px;">⚠</div>
        <div style="font-family:var(--condensed);font-size:20px;color:var(--red);">Database connection failed</div>
        <div style="font-size:13px;color:var(--text3);font-family:var(--mono);">${e.message}</div>
        <button class="btn btn-primary" onclick="initApp()">Retry</button>
      </div>
    `;
    return;
  }

  document.getElementById('page-date').textContent = today.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('urgent-badge').textContent = urgentCount();
  showPage('dashboard');
}

initApp();
</script>
